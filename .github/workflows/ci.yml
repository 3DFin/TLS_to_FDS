name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]
        
    - name: Run Ruff (Linter)
      run: ruff check .
      
    - name: Run Ruff (Formatter Check)
      run: ruff format --check .
      
    - name: Run Tests
      # If using PySide6 in headless CI, we often need to export QT_QPA_PLATFORM=offscreen
      # Or just use pytest-qt, but for now we set the env var to avoid X11 errors during imports if gui is loaded.
      env:
        QT_QPA_PLATFORM: offscreen
      run: pytest
